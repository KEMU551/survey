<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>イベントアンケート ＆ 引き換え券</title>
  <style>
    :root {
      --primary-color: #4f46e5;
      --success-color: #10b981;
      --error-color: #ef4444;
      --bg-color: #f3f4f6;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background-color: var(--bg-color);
      margin: 0;
      padding: 16px;
      color: #1f2937;
    }
    .container {
      max-width: 500px;
      margin: 0 auto;
      background: white;
      padding: 24px;
      border-radius: 12px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
    }
    h1 {
      font-size: 1.5rem;
      text-align: center;
      margin-bottom: 24px;
      color: #111827;
    }
    .hidden { display: none !important; }
    
    /* フォームパーツ */
    .form-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      font-weight: 600;
      margin-bottom: 8px;
    }
    select, textarea, input[type="password"] {
      width: 100%;
      padding: 10px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      box-sizing: border-box;
      font-size: 1rem;
    }
    button {
      width: 100%;
      background-color: var(--primary-color);
      color: white;
      border: none;
      padding: 12px;
      border-radius: 6px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    button:disabled {
      background-color: #9ca3af;
      cursor: not-allowed;
    }
    
    /* チケット画面の装飾 */
    .ticket {
      border: 2px dashed var(--primary-color);
      border-radius: 8px;
      padding: 20px;
      text-align: center;
      background-color: #fbfbfe;
      margin-bottom: 20px;
    }
    .ticket-title {
      font-size: 1.4rem;
      color: var(--primary-color);
      font-weight: bold;
      margin-bottom: 10px;
    }
    .claimed {
      border-color: #9ca3af;
      background-color: #f3f4f6;
    }
    .claimed .ticket-title {
      color: #9ca3af;
      text-decoration: line-through;
    }
    .loading-spinner {
      text-align: center;
      padding: 20px;
    }
  </style>
</head>
<body>

  <div class="container">
    <!-- ローディング表示 -->
    <div id="loading" class="loading-spinner hidden">処理中...</div>

    <!-- 1日1回制限メッセージ -->
    <div id="already-submitted-view" class="hidden">
      <h1>本日は回答済みです</h1>
      <p style="text-align: center; line-height: 1.6;">
        アンケートの回答は1日1回までとなっております。<br>また明日以降のご参加をお待ちしております！
      </p>
    </div>

    <!-- アンケート入力フォーム -->
    <form id="survey-form">
      <h1>イベントアンケート</h1>
      
      <!-- 選択式質問 (5問) -->
      <div class="form-group">
        <label>Q1. 本日のイベントはいかがでしたか？</label>
        <select name="q1" required>
          <option value="">選択してください</option>
          <option value="大変満足">大変満足</option>
          <option value="満足">満足</option>
          <option value="普通">普通</option>
          <option value="不満">不満</option>
        </select>
      </div>

      <div class="form-group">
        <label>Q2. 会場の雰囲気はいかがでしたか？</label>
        <select name="q2" required>
          <option value="">選択してください</option>
          <option value="良い">良い</option>
          <option value="普通">普通</option>
          <option value="改善の余地あり">改善の余地あり</option>
        </select>
      </div>

      <div class="form-group">
        <label>Q3. イベントを知ったきっかけは何ですか？</label>
        <select name="q3" required>
          <option value="">選択してください</option>
          <option value="SNS">SNS</option>
          <option value="知人の紹介">知人の紹介</option>
          <option value="チラシ・ポスター">チラシ・ポスター</option>
          <option value="その他">その他</option>
        </select>
      </div>

      <div class="form-group">
        <label>Q4. 次回も参加したいですか？</label>
        <select name="q4" required>
          <option value="">選択してください</option>
          <option value="ぜひ参加したい">ぜひ参加したい</option>
          <option value="内容次第で参加したい">内容次第で参加したい</option>
          <option value="参加しない">参加しない</option>
        </select>
      </div>

      <div class="form-group">
        <label>Q5. お住まいの地域を教えてください</label>
        <select name="q5" required>
          <option value="">選択してください</option>
          <option value="市内">市内</option>
          <option value="県内（市外）">県内（市外）</option>
          <option value="県外">県外</option>
        </select>
      </div>

      <!-- 最後に表示されるメッセージ入力欄 -->
      <div class="form-group">
        <label for="message">会場のスクリーンに届くメッセージをどうぞ！</label>
        <textarea id="message" name="message" rows="3" placeholder="コメントを入力してください（任意）" maxlength="100"></textarea>
      </div>

      <button type="submit" id="submit-btn">アンケートを送信して賞品をもらう</button>
    </form>

    <!-- 賞品引き換え・スタッフ消込画面 -->
    <div id="ticket-view" class="hidden">
      <h1>賞品引き換え画面</h1>
      
      <div id="ticket-box" class="ticket">
        <div class="ticket-title">🎁 賞品引き換え券 🎁</div>
        <p id="ticket-status-text">スタッフにこの画面を提示してください</p>
      </div>

      <!-- スタッフ専用消込エリア -->
      <div id="staff-area">
        <div class="form-group">
          <label for="passcode" style="color: var(--error-color);">【スタッフ専用】消込パスコード</label>
          <input type="password" id="passcode" placeholder="4桁のコードを入力">
        </div>
        <button id="claim-btn" style="background-color: var(--success-color);">消込を処理する</button>
      </div>
    </div>
  </div>

  <script>
    // ⚠️ 取得したGASのウェブアプリURLをここに貼り付けてください
    const GAS_WEB_APP_URL = "ここにGASで取得したウェブアプリのURLを貼り付ける";

    const surveyForm = document.getElementById('survey-form');
    const ticketView = document.getElementById('ticket-view');
    const ticketBox = document.getElementById('ticket-box');
    const ticketStatusText = document.getElementById('ticket-status-text');
    const alreadySubmittedView = document.getElementById('already-submitted-view');
    const loading = document.getElementById('loading');
    const staffArea = document.getElementById('staff-area');
    const claimBtn = document.getElementById('claim-btn');
    const passcodeInput = document.getElementById('passcode');

    let currentResponseId = null;

    // ページロード時の初期処理
    window.addEventListener('DOMContentLoaded', async () => {
      // 1. 本日の送信制限チェック (⑦の機能)
      const todayStr = new Date().toISOString().split('T')[0]; // 例: "2026-07-17"
      const lastSubmitDate = localStorage.getItem('last_submit_date');
      const savedResponseId = localStorage.getItem('current_response_id');

      if (lastSubmitDate === todayStr) {
        // 今日すでに送信している場合
        surveyForm.classList.add('hidden');
        
        if (savedResponseId) {
          // 引き換え券が残っているかサーバーに確認
          showLoading(true);
          const isClaimed = await checkClaimStatusFromServer(savedResponseId);
          showLoading(false);
          
          currentResponseId = savedResponseId;
          showTicketView(isClaimed);
        } else {
          // 引き換え券情報がない場合は単に制限画面
          alreadySubmittedView.classList.remove('hidden');
        }
      }
    });

    // アンケート送信処理
    surveyForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      showLoading(true);

      const formData = new FormData(surveyForm);
      const payload = {
        action: 'submitForm',
        q1: formData.get('q1'),
        q2: formData.get('q2'),
        q3: formData.get('q3'),
        q4: formData.get('q4'),
        q5: formData.get('q5'),
        message: formData.get('message')
      };

      try {
        const response = await fetch(GAS_WEB_APP_URL, {
          method: 'POST',
          body: JSON.stringify(payload)
        });
        const result = await response.json();

        if (result.status === 'success') {
          currentResponseId = result.id;
          
          // 送信履歴をローカルに保存（1日1回制限用）
          const todayStr = new Date().toISOString().split('T')[0];
          localStorage.setItem('last_submit_date', todayStr);
          localStorage.setItem('current_response_id', currentResponseId);

          // 引き換え画面へ移行
          surveyForm.classList.add('hidden');
          showTicketView(false);
        } else {
          alert('送信に失敗しました。もう一度お試しください。');
        }
      } catch (err) {
        console.error(err);
        alert('通信エラーが発生しました。接続を確認してください。');
      } finally {
        showLoading(false);
      }
    });

    // スタッフ消込ボタンクリック処理
    claimBtn.addEventListener('click', async () => {
      const passcode = passcodeInput.value.trim();
      if (!passcode) {
        alert('パスコードを入力してください。');
        return;
      }

      showLoading(true);
      try {
        const response = await fetch(GAS_WEB_APP_URL, {
          method: 'POST',
          body: JSON.stringify({
            action: 'claimPrize',
            id: currentResponseId,
            passcode: passcode
          })
        });
        const result = await response.json();

        if (result.status === 'success') {
          alert('賞品の引き換えが完了しました！');
          showTicketView(true);
        } else {
          alert(result.message || 'エラーが発生しました。');
        }
      } catch (err) {
        console.error(err);
        alert('通信エラーが発生しました。');
      } finally {
        showLoading(false);
      }
    });

    // ヘルパー関数群
    function showLoading(show) {
      if (show) {
        loading.classList.remove('hidden');
      } else {
        loading.classList.add('hidden');
      }
    }

    // サーバー上の引き換え状態を確認
    async function checkClaimStatusFromServer(id) {
      try {
        const response = await fetch(`${GAS_WEB_APP_URL}?action=checkStatus&id=${id}`);
        const result = await response.json();
        return result.status === 'success' ? result.claimed : false;
      } catch (err) {
        console.error(err);
        return false;
      }
    }

    // 引き換え画面の表示切替
    function showTicketView(isClaimed) {
      ticketView.classList.remove('hidden');
      if (isClaimed) {
        ticketBox.classList.add('claimed');
        ticketStatusText.innerHTML = "✨ <b>引き換え済み</b> ✨<br>ありがとうございました！";
        staffArea.classList.add('hidden'); // 消込エリアを非表示にする
      } else {
        ticketBox.classList.remove('claimed');
        ticketStatusText.innerHTML = "スタッフにこの画面を提示してください";
        staffArea.classList.remove('hidden');
        passcodeInput.value = "";
      }
    }
  </script>
</body>
</html>
