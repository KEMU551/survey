<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>コメント表示スクリーン</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #fff2e6; /* 温かみのある薄いパステルオレンジ */
      font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
      overflow: hidden;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
    }

    /* メッセージを表示する外枠のコンテナ */
    .screen-container {
      width: 90vw;
      height: 80vh;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
    }

    /* メッセージテキスト自体のスタイル */
    .message-card {
      font-weight: bold;
      text-align: center;
      line-height: 1.5;
      max-width: 95%;
      word-break: break-all;
      opacity: 0;
      transform: translateY(30px);
      transition: opacity 0.8s ease, transform 0.8s ease;
      position: absolute;
      text-shadow: 2px 2px 8px rgba(255, 255, 255, 0.9);
      z-index: 10;
    }

    /* 文字数に合わせたフォントサイズ調整用のクラス */
    .size-large {
      font-size: 5rem;
    }
    .size-medium {
      font-size: 3.6rem;
    }

    /* 通常の表示フェードイン */
    .message-card.active {
      opacity: 1;
      transform: translateY(0);
    }

    /* ーーー ✨新着コメント時の追加演出エフェクト✨ ーーー */

    /* 1. テキストがポップに跳ねるアニメーション */
    @keyframes popIn {
      0% {
        opacity: 0;
        transform: scale(0.3) rotate(-5deg);
      }
      50% {
        transform: scale(1.1) rotate(3deg);
      }
      70% {
        transform: scale(0.95) rotate(-1deg);
      }
      100% {
        opacity: 1;
        transform: scale(1) rotate(0deg);
      }
    }

    .message-card.new-arrival {
      animation: popIn 1.2s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }

    /* 2. 背景に広がる光の波紋（パルス）エフェクト */
    .pulse-ring {
      position: absolute;
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,122,69,0.4) 0%, rgba(255,122,69,0) 70%);
      opacity: 0;
      pointer-events: none;
      z-index: 1;
    }

    @keyframes pulseEffect {
      0% {
        transform: scale(1);
        opacity: 1;
      }
      100% {
        transform: scale(12);
        opacity: 0;
      }
    }

    .pulse-ring.active {
      animation: pulseEffect 1.5s cubic-bezier(0.1, 0.8, 0.3, 1) forwards;
    }

    /* ーーー ーーーーーーーーーーーーーーーーーーーーーー ーーー */

    /* フルスクリーンボタン（全画面時は自動で非表示になります） */
    .fullscreen-btn {
      position: absolute;
      bottom: 20px;
      right: 20px;
      background-color: rgba(255, 122, 69, 0.2);
      color: #8c532e;
      border: 1px solid rgba(255, 122, 69, 0.4);
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 0.85rem;
      cursor: pointer;
      transition: background-color 0.2s, color 0.2s, opacity 0.3s ease;
      z-index: 100;
    }
    .fullscreen-btn:hover {
      background-color: rgba(255, 122, 69, 0.8);
      color: white;
    }
    .fullscreen-btn.hidden {
      opacity: 0;
      pointer-events: none; /* クリックもできないようにする */
    }
  </style>
</head>
<body>

  <div class="screen-container" id="screen"></div>
  
  <!-- 波紋演出用のダミーコンテナ -->
  <div id="effect-container" style="position: absolute; width: 100%; height: 100%; overflow: hidden; pointer-events: none; top: 0; left: 0;"></div>
  
  <!-- 全画面切り替えボタン -->
  <button class="fullscreen-btn" id="fs-btn">🖥️ 全画面表示</button>

  <script>
    // ⚠️ 取得したGASのウェブアプリURLをここに貼り付けてください
    const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwCYEdOgFAy09NT9-KjcKNARvFM0IegazLoCjMOi-nZOU1m97OmFp8u3rvw66IGQUWgYQ/exec";
    
    const screen = document.getElementById('screen');
    const fsBtn = document.getElementById('fs-btn');
    const effectContainer = document.getElementById('effect-container');
    
    let messageList = [];       // 現在のメッセージリスト
    let knownMessages = new Set(); // すでに一度でも読み込んだことのあるメッセージ（既読リスト）
    let currentIndex = 0;
    let loopInterval = null;

    // パステルオレンジ背景に映える、視認性の高いカラーパレット
    const readabilityColors = [
      '#5c3a21', // リッチブラウン
      '#bf360c', // ダークアプリコット・テラコッタ
      '#0d47a1', // ロイヤルブルー
      '#1b5e20', // フォレストグリーン
      '#4a148c', // ディープパープル
      '#b71c1c'  // カーマインレッド
    ];

    // 🔄 1. サーバーから最新メッセージを取得
    async function fetchLatestMessages() {
      try {
        const response = await fetch(`${GAS_WEB_APP_URL}?action=getMessages`);
        const result = await response.json();
        
        if (result.status === 'success' && result.messages.length > 0) {
          const fetchedMessages = result.messages;

          // 💡 初回ロード時は、取得したすべてのメッセージを「既読（新着扱いしない）」にする
          if (knownMessages.size === 0) {
            fetchedMessages.forEach(msg => knownMessages.add(msg));
          }

          messageList = fetchedMessages;
          
          if (!loopInterval) {
            startLoop();
          }
        } else if (result.messages.length === 0) {
          messageList = [];
          clearScreen();
        }
      } catch (err) {
        console.error("データ取得エラー:", err);
      }
    }

    // 🎬 2. 5秒間隔のループを開始
    function startLoop() {
      renderNextMessage();
      
      loopInterval = setInterval(() => {
        renderNextMessage();
      }, 5000);
    }

    function clearScreen() {
      const oldCard = document.querySelector('.message-card');
      if (oldCard) {
        oldCard.remove();
      }
    }

    // ✨ 3. 波紋（パルス）エフェクトを発生させる関数
    function triggerPulseEffect() {
      // 既存のパルスリングをクリア
      effectContainer.innerHTML = '';

      // 中央にリングを生成
      const ring = document.createElement('div');
      ring.className = 'pulse-ring';
      // 画面中央に配置
      ring.style.left = 'calc(50vw - 50px)';
      ring.style.top = 'calc(50vh - 50px)';
      
      effectContainer.appendChild(ring);

      // アニメーション開始
      setTimeout(() => {
        ring.classList.add('active');
      }, 50);
    }

    // 📐 4. 次のメッセージを描画（既読チェック＆新着時スペシャル演出）
    function renderNextMessage() {
      if (messageList.length === 0) {
        clearScreen();
        return;
      }

      if (currentIndex >= messageList.length) {
        currentIndex = 0;
      }

      const text = messageList[currentIndex];
      currentIndex++;

      // 💡 未読（新着）コメントかどうかを判定
      const isNewMessage = !knownMessages.has(text);
      if (isNewMessage) {
        knownMessages.add(text); // 既読リストに登録
      }

      // 古いカードを退場させる
      const oldCard = document.querySelector('.message-card');
      if (oldCard) {
        oldCard.style.opacity = '0';
        oldCard.style.transform = 'translateY(-30px)';
        setTimeout(() => oldCard.remove(), 800);
      }

      // 新しいメッセージカードを生成
      const newCard = document.createElement('div');
      
      if (text.length <= 20) {
        newCard.className = 'message-card size-large';
      } else {
        newCard.className = 'message-card size-medium';
      }

      const randomColor = readabilityColors[Math.floor(Math.random() * readabilityColors.length)];
      newCard.style.color = randomColor;
      newCard.innerText = text;
      
      screen.appendChild(newCard);

      // 🌟 新着メッセージだった場合の豪華演出
      if (isNewMessage) {
        // パルス（波紋）を広げる
        triggerPulseEffect();
        // 新着用のポップ弾むアニメーションクラスを付与
        setTimeout(() => {
          newCard.classList.add('new-arrival');
        }, 50);
      } else {
        // 通常のフワッとした表示
        setTimeout(() => {
          newCard.classList.add('active');
        }, 50);
      }
    }

    // 🖥️ 5. フルスクリーン（全画面）切り替え制御
    fsBtn.addEventListener('click', () => {
      toggleFullscreen();
    });

    // ダブルクリックでもフルスクリーン切り替え可能
    document.addEventListener('dblclick', () => {
      toggleFullscreen();
    });

    function toggleFullscreen() {
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen().then(() => {
          // 全画面になったらボタンを完全に消去して、見えなくする
          fsBtn.classList.add('hidden');
        }).catch(err => {
          alert(`全画面表示への切り替えに失敗しました: ${err.message}`);
        });
      } else {
        document.exitFullscreen();
      }
    }

    // ブラウザ標準の機能で全画面が解除された（Escキーなど）のを検知してボタンを復活させる
    document.addEventListener('fullscreenchange', () => {
      if (!document.fullscreenElement) {
        fsBtn.classList.remove('hidden');
        fsBtn.innerText = "🖥️ 全画面表示";
      }
    });

    // 🚀 初期起動
    window.addEventListener('DOMContentLoaded', () => {
      fetchLatestMessages();
      // パトロール間隔を 3秒（3000ms）に短縮してリアルタイム性をアップ！
      setInterval(fetchLatestMessages, 30000); 
    });
  </script>
</body>
</html>
