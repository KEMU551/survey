<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>コメント表示スクリーン</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #fff2e6; /* 温かみのある薄いパステルオレンジ */
      font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
      overflow: hidden;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
    }

    /* メッセージを表示する外枠のコンテナ */
    .screen-container {
      width: 90vw;
      height: 80vh;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
    }

    /* メッセージテキスト自体のスタイル */
    .message-card {
      font-weight: bold;
      text-align: center;
      line-height: 1.5;
      max-width: 95%;
      word-break: break-all;
      opacity: 0;
      transform: translateY(30px);
      transition: opacity 0.8s ease, transform 0.8s ease;
      position: absolute;
      text-shadow: 2px 2px 8px rgba(255, 255, 255, 0.9); /* 白のシャドウで可読性を強固に補強 */
    }

    /* 文字数に合わせたフォントサイズ調整用のクラス */
    .size-large {
      font-size: 5rem;    /* 20文字以下：大きく表示 */
    }
    .size-medium {
      font-size: 3.6rem;  /* 21〜35文字：少し小さくして折り返しを綺麗に */
    }

    /* 表示状態のアニメーション用クラス */
    .message-card.active {
      opacity: 1;
      transform: translateY(0);
    }

    /* フルスクリーンボタン */
    .fullscreen-btn {
      position: absolute;
      bottom: 20px;
      right: 20px;
      background-color: rgba(255, 122, 69, 0.2);
      color: #8c532e;
      border: 1px solid rgba(255, 122, 69, 0.4);
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 0.85rem;
      cursor: pointer;
      transition: background-color 0.2s, color 0.2s;
      z-index: 100;
    }
    .fullscreen-btn:hover {
      background-color: rgba(255, 122, 69, 0.8);
      color: white;
    }
  </style>
</head>
<body>

  <div class="screen-container" id="screen"></div>
  
  <!-- 全画面切り替えボタン -->
  <button class="fullscreen-btn" id="fs-btn">🖥️ 全画面表示</button>

  <script>
    // ⚠️ 取得したGASのウェブアプリURLをここに貼り付けてください
    const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwCYEdOgFAy09NT9-KjcKNARvFM0IegazLoCjMOi-nZOU1m97OmFp8u3rvw66IGQUWgYQ/exec";
    
    const screen = document.getElementById('screen');
    const fsBtn = document.getElementById('fs-btn');
    
    let messageList = [];  // スプレッドシートから取得した最新10件の格納用
    let currentIndex = 0;  // 現在何番目を表示しているか
    let loopInterval = null;

    // パステルオレンジ背景（#fff2e6）に映える、視認性が抜群で温かみのあるカラーパレット
    const readabilityColors = [
      '#5c3a21', // リッチブラウン
      '#bf360c', // ダークアプリコット・テラコッタ
      '#0d47a1', // ロイヤルブルー（知的な差し色）
      '#1b5e20', // フォレストグリーン（ナチュラルな優しさ）
      '#4a148c', // ディープパープル
      '#b71c1c'  // カーマインレッド
    ];

    // 🔄 1. サーバーから最新10件を引っ張ってくる関数
    async function fetchLatestMessages() {
      try {
        const response = await fetch(`${GAS_WEB_APP_URL}?action=getMessages`);
        const result = await response.json();
        
        if (result.status === 'success' && result.messages.length > 0) {
          messageList = result.messages;
          
          if (!loopInterval) {
            startLoop();
          }
        } else if (result.messages.length === 0) {
          messageList = [];
          clearScreen();
        }
      } catch (err) {
        console.error("データ取得エラー:", err);
      }
    }

    // 🎬 2. 5秒間隔のローテーションループを開始する関数
    function startLoop() {
      renderNextMessage();
      
      loopInterval = setInterval(() => {
        renderNextMessage();
      }, 5000);
    }

    function clearScreen() {
      const oldCard = document.querySelector('.message-card');
      if (oldCard) {
        oldCard.remove();
      }
    }

    // 📐 3. 次のメッセージを描画する関数（ランダム配色 ＆ 文字サイズ可変）
    function renderNextMessage() {
      if (messageList.length === 0) {
        clearScreen();
        return;
      }

      if (currentIndex >= messageList.length) {
        currentIndex = 0;
      }

      const text = messageList[currentIndex];
      currentIndex++;

      // 古いカードをフェードアウト退場
      const oldCard = document.querySelector('.message-card');
      if (oldCard) {
        oldCard.style.opacity = '0';
        oldCard.style.transform = 'translateY(-30px)';
        setTimeout(() => oldCard.remove(), 800);
      }

      // 新しいメッセージカードを生成
      const newCard = document.createElement('div');
      
      // 文字数による最適なフォントサイズクラスの適用
      if (text.length <= 20) {
        newCard.className = 'message-card size-large';
      } else {
        newCard.className = 'message-card size-medium';
      }

      // カラーパレットからランダムで1色選択して設定
      const randomColor = readabilityColors[Math.floor(Math.random() * readabilityColors.length)];
      newCard.style.color = randomColor;
      newCard.innerText = text;
      
      screen.appendChild(newCard);

      // アニメーションのトリガー
      setTimeout(() => {
        newCard.classList.add('active');
      }, 50);
    }

    // 🖥️ 4. フルスクリーン（全画面）切り替え制御
    fsBtn.addEventListener('click', () => {
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen().then(() => {
          fsBtn.innerText = "✖ 全画面解除";
        }).catch(err => {
          alert(`全画面表示への切り替えに失敗しました: ${err.message}`);
        });
      } else {
        document.exitFullscreen().then(() => {
          fsBtn.innerText = "🖥️ 全画面表示";
        });
      }
    });

    // 画面ダブルクリックでも全画面切り替えできるようにする（便利機能）
    document.addEventListener('dblclick', () => {
      fsBtn.click();
    });

    // 🚀 初期起動
    window.addEventListener('DOMContentLoaded', () => {
      fetchLatestMessages();
      // 30秒ごとにスプレッドシートの最新状態を確認
      setInterval(fetchLatestMessages, 30000);
    });
  </script>
</body>
</html>
