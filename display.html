<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>コメント表示スクリーン</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #fff2e6; /* 温かみのある薄いパステルオレンジ */
      font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
      overflow: hidden;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
    }

    /* メッセージを表示する外枠のコンテナ */
    .screen-container {
      width: 90vw;
      height: 80vh;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
    }

    /* メッセージテキスト自体のスタイル */
    .message-card {
      font-weight: bold;
      text-align: center;
      line-height: 1.5;
      max-width: 95%;
      word-break: break-all;
      opacity: 0;
      transform: translateY(30px);
      transition: opacity 0.8s ease, transform 0.8s ease;
      position: absolute;
      text-shadow: 2px 2px 8px rgba(255, 255, 255, 0.9);
      z-index: 10;
    }

    /* 文字数に合わせたフォントサイズ調整用のクラス */
    .size-large {
      font-size: 5rem;
    }
    .size-medium {
      font-size: 3.6rem;
    }

    /* 通常の表示フェードイン */
    .message-card.active {
      opacity: 1;
      transform: translateY(0);
    }

    /* ーーー ✨新着コメント時の追加演出エフェクト✨ ーーー */

    /* 1. テキストがポップに跳ねるアニメーション */
    @keyframes popIn {
      0% {
        opacity: 0;
        transform: scale(0.3) rotate(-5deg);
      }
      50% {
        transform: scale(1.1) rotate(3deg);
      }
      70% {
        transform: scale(0.95) rotate(-1deg);
      }
      100% {
        opacity: 1;
        transform: scale(1) rotate(0deg);
      }
    }

    .message-card.new-arrival {
      animation: popIn 1.2s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }

    /* 2. 背景に広がる光の波紋（パルス）エフェクト */
    .pulse-ring {
      position: absolute;
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,122,69,0.4) 0%, rgba(255,122,69,0) 70%);
      opacity: 0;
      pointer-events: none;
      z-index: 1;
    }

    @keyframes pulseEffect {
      0% {
        transform: scale(1);
        opacity: 1;
      }
      100% {
        transform: scale(12);
        opacity: 0;
      }
    }

    .pulse-ring.active {
      animation: pulseEffect 1.5s cubic-bezier(0.1, 0.8, 0.3, 1) forwards;
    }

    /* ーーー ーーーーーーーーーーーーーーーーーーーーーー ーーー */

    /* フルスクリーンボタン */
    .fullscreen-btn {
      position: absolute;
      bottom: 20px;
      right: 20px;
      background-color: rgba(255, 122, 69, 0.2);
      color: #8c532e;
      border: 1px solid rgba(255, 122, 69, 0.4);
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 0.85rem;
      cursor: pointer;
      transition: background-color 0.2s, color 0.2s, opacity 0.3s ease;
      z-index: 100;
    }
    .fullscreen-btn:hover {
      background-color: rgba(255, 122, 69, 0.8);
      color: white;
    }
    .fullscreen-btn.hidden {
      opacity: 0;
      pointer-events: none;
    }
  </style>
</head>
<body>

  <div class="screen-container" id="screen"></div>
  
  <!-- 波紋演出用のエフェクトコンテナ -->
  <div id="effect-container" style="position: absolute; width: 100%; height: 100%; overflow: hidden; pointer-events: none; top: 0; left: 0;"></div>
  
  <!-- 全画面切り替えボタン -->
  <button class="fullscreen-btn" id="fs-btn">🖥️ 全画面表示</button>

  <script>
    // ⚠️ 取得したGASのウェブアプリURLをここに貼り付けてください
    const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwCYEdOgFAy09NT9-KjcKNARvFM0IegazLoCjMOi-nZOU1m97OmFp8u3rvw66IGQUWgYQ/exec";
    
    const screen = document.getElementById('screen');
    const fsBtn = document.getElementById('fs-btn');
    const effectContainer = document.getElementById('effect-container');
    
    let messageList = [];       // ループ再生用の全メッセージ配列
    let knownMessages = new Set(); // 既読メッセージのセット
    let currentIndex = 0;
    let loopInterval = null;

    const readabilityColors = [
      '#5c3a21', '#bf360c', '#0d47a1', '#1b5e20', '#4a148c', '#b71c1c'
    ];

    // 🔄 1. サーバーから最新メッセージを取得
    async function fetchLatestMessages() {
      try {
        const response = await fetch(`${GAS_WEB_APP_URL}?action=getMessages`);
        const result = await response.json();
        
        if (result.status === 'success' && result.messages.length > 0) {
          const fetchedMessages = result.messages; // 古いものが先頭（新着が末尾）の配列

          // 【初回読み込み時】
          if (knownMessages.size === 0) {
            fetchedMessages.forEach(msg => knownMessages.add(msg));
            // ループ表示用に「新しい順（配列を逆転）」にして保持する
            messageList = [...fetchedMessages].reverse();
            startLoop();
            return;
          }

          // 【2回目以降：新着メッセージの抽出】
          // GASの仕様に合わせて「配列の末尾（最新投稿）」から逆順に未読をチェック
          let newMessages = [];
          for (let i = fetchedMessages.length - 1; i >= 0; i--) {
            if (!knownMessages.has(fetchedMessages[i])) {
              newMessages.push(fetchedMessages[i]); // 新しいものから順に入る
            } else {
              break; // 既読に出会ったら終了
            }
          }

          // 🔥 新着があった場合の割り込み処理
          if (newMessages.length > 0) {
            newMessages.forEach(msg => knownMessages.add(msg));

            // 全体の再生リストを最新状態（新しい順）に更新
            messageList = [...fetchedMessages].reverse();
            
            // 次に再生すべき位置を「新着メッセージの先頭」にするために、インデックスを0番目に強制リセット
            currentIndex = 0; 

            // ⚡ 5秒タイマーを一度クリアし、即座に新着演出で表示
            if (loopInterval) clearInterval(loopInterval);
            renderNextMessage(true); 

            // 5秒の通常ループを再開
            loopInterval = setInterval(() => {
              renderNextMessage(false);
            }, 5000);
          }

        } else if (result.messages.length === 0) {
          messageList = [];
          clearScreen();
        }
      } catch (err) {
        console.error("データ取得エラー:", err);
      }
    }

    // 🎬 2. 通常の5秒間隔ループを開始
    function startLoop() {
      if (loopInterval) clearInterval(loopInterval);
      renderNextMessage(false);
      
      loopInterval = setInterval(() => {
        renderNextMessage(false);
      }, 5000);
    }

    function clearScreen() {
      const oldCard = document.querySelector('.message-card');
      if (oldCard) oldCard.remove();
      if (loopInterval) {
        clearInterval(loopInterval);
        loopInterval = null;
      }
    }

    // ✨ 3. 波紋（パルス）エフェクト
    function triggerPulseEffect() {
      effectContainer.innerHTML = '';
      const ring = document.createElement('div');
      ring.className = 'pulse-ring';
      ring.style.left = 'calc(50vw - 50px)';
      ring.style.top = 'calc(50vh - 50px)';
      effectContainer.appendChild(ring);

      setTimeout(() => {
        ring.classList.add('active');
      }, 50);
    }

    // 📐 4. メッセージを描画
    function renderNextMessage(isForceNew = false) {
      if (messageList.length === 0) {
        clearScreen();
        return;
      }

      // ループが末尾まで来たら先頭に戻る
      if (currentIndex >= messageList.length) {
        currentIndex = 0;
      }

      const text = messageList[currentIndex];
      currentIndex++;

      // 古いカードを退場させる
      const oldCard = document.querySelector('.message-card');
      if (oldCard) {
        oldCard.style.opacity = '0';
        oldCard.style.transform = 'translateY(-30px)';
        setTimeout(() => oldCard.remove(), 800);
      }

      // 新しいメッセージカードを生成
      const newCard = document.createElement('div');
      if (text.length <= 20) {
        newCard.className = 'message-card size-large';
      } else {
        newCard.className = 'message-card size-medium';
      }

      const randomColor = readabilityColors[Math.floor(Math.random() * readabilityColors.length)];
      newCard.style.color = randomColor;
      newCard.innerText = text;
      
      screen.appendChild(newCard);

      // エフェクトの適用
      if (isForceNew) {
        triggerPulseEffect();
        setTimeout(() => {
          newCard.classList.add('new-arrival');
        }, 50);
      } else {
        setTimeout(() => {
          newCard.classList.add('active');
        }, 50);
      }
    }

    // 🖥️ 5. フルスクリーン切り替え制御
    fsBtn.addEventListener('click', () => toggleFullscreen());
    document.addEventListener('dblclick', () => toggleFullscreen());

    function toggleFullscreen() {
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen().then(() => {
          fsBtn.classList.add('hidden');
        }).catch(err => {
          alert(`全画面表示への切り替えに失敗しました: ${err.message}`);
        });
      } else {
        document.exitFullscreen();
      }
    }

    document.addEventListener('fullscreenchange', () => {
      if (!document.fullscreenElement) {
        fsBtn.classList.remove('hidden');
        fsBtn.innerText = "🖥️ 全画面表示";
      }
    });

    // 🚀 初期起動
    window.addEventListener('DOMContentLoaded', () => {
      fetchLatestMessages();
      // 正しく 3秒（3000ms）ごとにバックグラウンドで新着チェック
      setInterval(fetchLatestMessages, 3000);
    });
  </script>
</body>
</html>
