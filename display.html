<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>コメント表示スクリーン</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #fff2e6; /* 温かみのある薄いパステルオレンジ */
      color: #5c3a21;            /* 視認性の高い、はっきりとした濃いブラウン */
      font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
      overflow: hidden;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* メッセージを表示する外枠のコンテナ */
    .screen-container {
      width: 90vw;
      height: 80vh;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
    }

    /* メッセージテキスト自体のスタイル */
    .message-card {
      font-size: 4.5rem;
      font-weight: bold;
      text-align: center;
      line-height: 1.5;
      max-width: 100%;
      word-break: break-all;
      opacity: 0;
      transform: translateY(30px);
      transition: opacity 0.8s ease, transform 0.8s ease;
      position: absolute;
      text-shadow: 2px 2px 4px rgba(255, 255, 255, 0.8); /* 文字をよりくっきり際立たせる */
    }

    /* 表示状態のアニメーション用クラス */
    .message-card.active {
      opacity: 1;
      transform: translateY(0);
    }
  </style>
</head>
<body>

  <div class="screen-container" id="screen">
    <!-- 薄い文字を一切排除し、完全に空にしています -->
  </div>

  <script>
    // ⚠️ 取得したGASのウェブアプリURLをここに貼り付けてください
    const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwCYEdOgFAy09NT9-KjcKNARvFM0IegazLoCjMOi-nZOU1m97OmFp8u3rvw66IGQUWgYQ/exec";
    
    const screen = document.getElementById('screen');
        
    let messageList = [];  // スプレッドシートから取得した最新10件の格納用
    let currentIndex = 0;  // 現在何番目を表示しているか
    let loopInterval = null;

    // 🔄 1. サーバーから最新10件を引っ張ってくる関数
    async function fetchLatestMessages() {
      try {
        const response = await fetch(`${GAS_WEB_APP_URL}?action=getMessages`);
        const result = await response.json();
        
        if (result.status === 'success' && result.messages.length > 0) {
          messageList = result.messages;
          
          // ループタイマーがまだ動いていなければ起動
          if (!loopInterval) {
            startLoop();
          }
        } else if (result.messages.length === 0) {
          messageList = [];
          clearScreen();
        }
      } catch (err) {
        console.error("データ取得エラー:", err);
      }
    }

    // 🎬 2. 5秒間隔のローテーションループを開始する関数
    function startLoop() {
      renderNextMessage();
      
      loopInterval = setInterval(() => {
        renderNextMessage();
      }, 5000);
    }

    // 🎨 画面のメッセージカードを安全に消去する関数
    function clearScreen() {
      const oldCard = document.querySelector('.message-card');
      if (oldCard) {
        oldCard.remove();
      }
    }

    // 📐 3. 次のメッセージを画面に描画する関数（スライド・フェードイン効果）
    function renderNextMessage() {
      if (messageList.length === 0) {
        clearScreen();
        return;
      }

      if (currentIndex >= messageList.length) {
        currentIndex = 0;
      }

      const text = messageList[currentIndex];
      currentIndex++;

      // 古い要素があればフェードアウトさせて消去
      const oldCard = document.querySelector('.message-card');
      if (oldCard) {
        oldCard.style.opacity = '0';
        oldCard.style.transform = 'translateY(-30px)';
        setTimeout(() => oldCard.remove(), 800);
      }

      // 新しいメッセージカードを生成して追加
      const newCard = document.createElement('div');
      newCard.className = 'message-card';
      newCard.innerText = text;
      screen.appendChild(newCard);

      // 一瞬だけ遅らせてアニメーションを発火
      setTimeout(() => {
        newCard.classList.add('active');
      }, 50);
    }

    // 🚀 初期起動時の処理
    window.addEventListener('DOMContentLoaded', () => {
      fetchLatestMessages();
      
      // 30秒ごとにスプレッドシートの最新状態を確認
      setInterval(fetchLatestMessages, 30000);
    });
  </script>
</body>
</html>
